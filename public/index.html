<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 问答工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="会话侧边栏">
        <div class="brand">
          <span class="brand-mark">AI</span>
          <div>
            <strong>问答系统</strong>
            <small>Multi-provider console</small>
          </div>
        </div>

        <button class="new-chat" id="newChatButton" type="button">
          <span aria-hidden="true">+</span>
          新建对话
        </button>

        <nav class="chat-list" id="chatList" aria-label="历史对话"></nav>

        <div class="sidebar-footer">
          <span class="status-dot" id="statusDot"></span>
          <span id="providerStatus">正在检测模型配置</span>
        </div>
      </aside>

      <main class="chat-stage">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" aria-label="展开会话栏">☰</button>
          <div class="model-controls">
            <label>
              <span>服务商</span>
              <select id="providerSelect"></select>
            </label>
            <label>
              <span>模型</span>
              <input id="modelInput" type="text" autocomplete="off" />
            </label>
          </div>
          <button class="ide-button" id="ideButton" type="button">IDE</button>
          <button class="ghost-button" id="settingsButton" type="button">参数</button>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <section class="composer-wrap">
          <div class="suggestions" id="suggestions">
            <button type="button">帮我写一份产品需求文档</button>
            <button type="button">解释这段报错并给出修复步骤</button>
            <button type="button">生成一段中文营销文案</button>
          </div>

          <form class="composer" id="chatForm">
            <textarea id="promptInput" rows="1" placeholder="向 AI 提问，支持 DeepSeek / GLM / 自定义 OpenAI-compatible API"></textarea>
            <button class="send-button" id="sendButton" type="submit" aria-label="发送">↑</button>
          </form>
          <p class="hint">后端会读取环境变量中的 API Key；前端不会暴露密钥。</p>
        </section>
      </main>

      <dialog class="settings-dialog" id="settingsDialog">
        <form method="dialog">
          <div class="dialog-head">
            <h2>生成参数</h2>
            <button class="icon-button" value="close" aria-label="关闭">×</button>
          </div>
          <label class="range-row">
            <span>Temperature</span>
            <input id="temperatureInput" type="range" min="0" max="1.5" step="0.1" value="0.7" />
            <output id="temperatureValue">0.7</output>
          </label>
          <div class="env-note">
            <strong>环境变量示例</strong>
            <code>DEEPSEEK_API_KEY=sk-...</code>
            <code>GLM_API_KEY=...</code>
            <code>CUSTOM_BASE_URL=https://your-api.example.com/v1</code>
          </div>
        </form>
      </dialog>

      <aside class="ide-drawer" id="ideDrawer" aria-label="IDE 工作区" aria-hidden="true">
        <div class="ide-head">
          <div>
            <strong>IDE 工作区</strong>
            <span>项目上下文 / 代码生成 / 调试记录</span>
          </div>
          <button class="icon-button" id="closeIdeButton" type="button" aria-label="关闭 IDE">×</button>
        </div>
        <div class="ide-body">
          <section class="ide-files" aria-label="项目文件">
            <button class="active" type="button">server.js</button>
            <button type="button">public/app.js</button>
            <button type="button">public/styles.css</button>
            <button type="button">README.md</button>
          </section>
          <section class="ide-editor" aria-label="代码草稿">
            <div class="editor-tabs">
              <span class="active">代码助手</span>
              <span>运行输出</span>
            </div>
            <textarea id="ideNotes" spellcheck="false">在这里记录你想让 AI 修改的代码、接口或报错信息。后续可以接入真实文件树、在线编辑器和终端输出。</textarea>
            <section class="nl2sql-panel" aria-label="NL2SQL 和智能图表">
              <div class="nl2sql-head">
                <div>
                  <strong>NL2SQL</strong>
                  <span>自然语言生成 SQL，并根据结果数据推荐图表</span>
                </div>
                <select id="sqlDialect" aria-label="SQL 方言">
                  <option>MySQL</option>
                  <option>PostgreSQL</option>
                  <option>SQLite</option>
                  <option>SQL Server</option>
                </select>
              </div>
              <label>
                <span>表结构</span>
                <textarea id="schemaInput" spellcheck="false" placeholder="users(id, name, created_at)\norders(id, user_id, amount, created_at)"></textarea>
              </label>
              <label>
                <span>问题</span>
                <textarea id="sqlQuestionInput" spellcheck="false" placeholder="统计最近 30 天每天的订单金额趋势"></textarea>
              </label>
              <button class="sql-action" id="generateSqlButton" type="button">生成 SQL</button>
              <pre class="sql-output" id="sqlOutput">SQL 会显示在这里</pre>
              <label>
                <span>查询结果 JSON / CSV</span>
                <textarea id="dataInput" spellcheck="false" placeholder='[{"date":"2026-05-01","amount":1280},{"date":"2026-05-02","amount":1660}]'></textarea>
              </label>
              <button class="sql-action secondary" id="renderChartButton" type="button">生成图表</button>
              <div class="chart-summary" id="chartSummary">等待数据</div>
              <div class="chart-canvas" id="chartCanvas" aria-label="自动图表预览"></div>
            </section>
          </section>
        </div>
      </aside>
      <div class="ide-backdrop" id="ideBackdrop" hidden></div>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
